<!DOCTYPE html>
<!--
  .excn status viewer — at-a-glance team status over the work-tracking JSON.
  Contract: read-only render of a selectable sprint (the switcher lists every
  probed sprint, active default; a closed sprint also shows its decisions,
  retrospective notes, and step_log verdicts), the backlog, and per-Teammate
  load (optional load_progress.json, EXEC-045). No build step; viewer.js fetches
  the .excn JSON client-side. Must be served over http(s) — file:// blocks
  fetch() of sibling files (see README.md).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>.excn status</title>
    <!-- Root-absolute asset refs: the daemon serves this page both at the bare
         '/' and at /.excn/viewer/, so a relative ref would 404 from one base. -->
    <link rel="stylesheet" href="/.excn/viewer/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>.excn status</h1>
      <p class="subtitle" id="sprint-line">Loading…</p>
      <!-- Sprint switcher (EXEC-071): populated by viewer.js from the probed
           sprint files, newest first, active sprint selected by default.
           Hidden until there is at least one sprint to list. -->
      <div class="switcher" id="switcher" hidden>
        <label class="switcher-label" for="sprint-select">View sprint</label>
        <select class="switcher-select" id="sprint-select"></select>
      </div>
    </header>

    <!-- Surfaced when the JSON cannot be fetched (almost always: opened over file://). -->
    <div id="load-error" class="load-error" hidden></div>

    <main id="board" class="board" hidden>
      <section class="lane lane-shipped">
        <h2 class="lane-title">Shipped <span class="count" id="count-shipped">0</span></h2>
        <div class="lane-body" id="lane-shipped"></div>
      </section>

      <section class="lane lane-in-progress">
        <h2 class="lane-title">In&nbsp;progress <span class="count" id="count-in-progress">0</span></h2>
        <div class="lane-body" id="lane-in-progress"></div>
      </section>

      <section class="lane lane-not-shipped">
        <h2 class="lane-title">Not&nbsp;shipped <span class="count" id="count-not-shipped">0</span></h2>
        <div class="lane-body" id="lane-not-shipped"></div>
      </section>

      <section class="lane lane-backlog">
        <h2 class="lane-title">Backlog <span class="count" id="count-backlog">0</span></h2>
        <div class="lane-body" id="lane-backlog"></div>
      </section>
    </main>

    <!-- Sprint detail (EXEC-071): the selected sprint's decisions, retrospective
         notes, and step_log gate verdicts. Each block is shown only when the
         selected sprint carries entries for it (a closed sprint always does;
         the active sprint shows whatever has accrued). The region itself is
         hidden when no block has content. -->
    <section id="sprint-detail" class="detail" hidden>
      <section class="detail-block" id="block-decisions" hidden>
        <h2 class="lane-title">Decisions <span class="count" id="count-decisions">0</span></h2>
        <div class="detail-body" id="detail-decisions"></div>
      </section>

      <section class="detail-block" id="block-retro" hidden>
        <h2 class="lane-title">Retrospective&nbsp;notes <span class="count" id="count-retro">0</span></h2>
        <div class="detail-body" id="detail-retro"></div>
      </section>

      <section class="detail-block" id="block-steplog" hidden>
        <h2 class="lane-title">Gate&nbsp;verdicts <span class="count" id="count-steplog">0</span></h2>
        <div class="detail-body" id="detail-steplog"></div>
      </section>
    </section>

    <!-- Per-Teammate load (EXEC-045): rendered from .excn/load_progress.json.
         The file is optional — absent means load reporting is off, and the
         panel shows an off state instead of breaking the board above. -->
    <section id="load-panel" class="load-panel" hidden>
      <h2 class="lane-title">Teammate&nbsp;load <span class="count" id="count-load">0</span></h2>
      <p class="load-note" id="load-note" hidden></p>
      <div class="load-body" id="load-body"></div>
    </section>

    <footer class="page-footer">
      <p id="footer-note">Read-only over the .excn work-tracking JSON.</p>
    </footer>

    <script src="/.excn/viewer/viewer.js"></script>
  </body>
</html>
